name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://localhost:5432/emc_crm?schema=public' }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_Y2xlcmsuYWNjb3VudHMuZGV2JA==' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_placeholder' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Validate required environment variables
        run: |
          has_missing=0
          check_required_var() {
            key="$1"
            value="$2"
            if [ -z "$value" ]; then
              echo "::error::Missing required environment variable: $key"
              has_missing=1
            fi
          }

          check_required_var "DATABASE_URL" "$DATABASE_URL"
          check_required_var "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
          check_required_var "CLERK_SECRET_KEY" "$CLERK_SECRET_KEY"

          if [ "$has_missing" -ne 0 ]; then
            exit 1
          fi
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build Next.js app
        run: npm run build
